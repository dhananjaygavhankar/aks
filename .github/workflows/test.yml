name: AKS_Cluster_creation

on:
  push:
    branches:
     - main 

# The permissions key grants the GITHUB_TOKEN read and write access
# to the repository's contents.
permissions:
  contents: write

jobs:
  terraform:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./parent 

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      id: setup_terraform
      uses: hashicorp/setup-terraform@v3

    # - name: Add Terraform to PATH
    #   run: |
    #     echo "${{ steps.setup_terraform.outputs.terraform_path }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check
      continue-on-error: true
    
    - name: Terraform Init
      id: init
      run: terraform init -input=false
    
    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
    
    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -input=false
      continue-on-error: true

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve
